<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Hygiene Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        
        .sidebar h2 { margin-bottom: 30px; }
        .sidebar nav a {
            display: block;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: background 0.3s;
        }
        .sidebar nav a:hover { background: rgba(255,255,255,0.2); }
        
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }
        
        .top-bar {
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }
        
        .btn-pdf { background: #e53e3e; color: white; }
        .btn-refresh { background: #48bb78; color: white; }
        .btn-logout { background: #667eea; color: white; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }
        
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        .violations-table {
            background: white;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        
        th { background: #f7fafc; }
        
        .severity-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .severity-badge.high { background: #fed7d7; color: #c53030; }
        .severity-badge.medium { background: #feebc8; color: #c05621; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🍽️ Hygiene Monitor</h2>
        <nav>
            <a href="/admin/dashboard">📊 Dashboard</a>
            <a href="/admin/monitor">🎥 Live Monitor</a>
        </nav>
    </div>
    
    <div class="main-content" id="dashboard-content">
        <div class="top-bar">
            <h1>Dashboard</h1>
            <div>
                <button class="btn btn-pdf" onclick="exportToPDF()">📄 Export to PDF</button>
                <button class="btn btn-refresh" onclick="loadData()">🔄 Refresh</button>
                <button class="btn btn-logout" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
        
        <div class="stats-grid" id="stats">
            <div class="stat-card"><h3>📊 Total Violations</h3><div class="stat-value" id="total">-</div></div>
            <div class="stat-card"><h3>📅 Today's Violations</h3><div class="stat-value" id="today">-</div></div>
            <div class="stat-card"><h3>🧢 No Cap</h3><div class="stat-value" id="nocap">-</div></div>
            <div class="stat-card"><h3>🧤 No Gloves</h3><div class="stat-value" id="nogloves">-</div></div>
        </div>
        
        <div class="charts-row">
            <div class="chart-container"><h3>Violations by Type</h3><canvas id="typeChart"></canvas></div>
            <div class="chart-container"><h3>Top Violators</h3><canvas id="employeeChart"></canvas></div>
        </div>
        
        <div class="violations-table">
            <h3>Recent Violations</h3>
            <table id="violationsTable">
                <thead><tr><th>Time</th><th>Employee</th><th>Violation Type</th><th>Severity</th></tr></thead>
                <tbody id="tableBody"><tr><td colspan="4" style="text-align: center;">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>
    
    <script>
        let typeChart, employeeChart;
        
        async function loadData() {
            try {
                const statsRes = await fetch('/api/get-stats');
                const stats = await statsRes.json();
                
                document.getElementById('total').textContent = stats.total || 0;
                document.getElementById('today').textContent = stats.today || 0;
                
                stats.by_type.forEach(item => {
                    if (item.type === 'No Cap') document.getElementById('nocap').textContent = item.count;
                    if (item.type === 'No Gloves') document.getElementById('nogloves').textContent = item.count;
                });
                
                updateCharts(stats);
                
                const violationsRes = await fetch('/api/get-violations');
                const violations = await violationsRes.json();
                updateTable(violations);
                
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function updateCharts(stats) {
            const typeLabels = stats.by_type.map(t => t.type);
            const typeData = stats.by_type.map(t => t.count);
            
            if (typeChart) typeChart.destroy();
            typeChart = new Chart(document.getElementById('typeChart'), {
                type: 'bar',
                data: { labels: typeLabels, datasets: [{ label: 'Violations', data: typeData, backgroundColor: ['#667eea', '#48bb78', '#ed8936'] }] },
                options: { responsive: true }
            });
            
            const empLabels = stats.top_employees.map(e => e.name);
            const empData = stats.top_employees.map(e => e.count);
            
            if (employeeChart) employeeChart.destroy();
            employeeChart = new Chart(document.getElementById('employeeChart'), {
                type: 'bar',
                data: { labels: empLabels, datasets: [{ label: 'Violations', data: empData, backgroundColor: '#ed8936' }] },
                options: { responsive: true, indexAxis: 'y' }
            });
        }
        
        function updateTable(violations) {
            const tbody = document.getElementById('tableBody');
            if (violations.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No violations yet</td></tr>';
                return;
            }
            
            tbody.innerHTML = violations.slice(0, 20).map(v => `
                <tr>
                    <td>${new Date(v.timestamp).toLocaleString()}</td>
                    <td>${v.employee_name}</td>
                    <td>${v.type}</td>
                    <td><span class="severity-badge ${v.severity}">${v.severity}</span></td>
                </tr>
            `).join('');
        }
        
        async function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('dashboard-content');
            const originalTitle = document.querySelector('.top-bar h1').innerHTML;
            
            // Show loading
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '⏳ Generating PDF...';
            btn.disabled = true;
            
            try {
                const canvas = await html2canvas(element, { scale: 2, logging: false });
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgWidth = 210;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                pdf.save(`hygiene-report-${new Date().toISOString().slice(0,19)}.pdf`);
            } catch (error) {
                console.error('PDF Error:', error);
                alert('Error generating PDF');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
        
        function logout() { window.location.href = '/logout'; }
        
        loadData();
        setInterval(loadData, 5000);
    </script>
</body>
</html>
