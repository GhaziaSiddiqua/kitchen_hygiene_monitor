<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kitchen Hygiene Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #48bb78;
            margin-top: 10px;
        }
        
        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .success {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        
        .switch-mode a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
        }
        
        .demo {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Kitchen Hygiene Monitor</h1>
        <div class="subtitle" id="form-title">Login to continue</div>
        
        <div id="error-message"></div>
        
        <!-- Login Form -->
        <form id="login-form" method="POST" action="/login">
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" name="employee_id" placeholder="Enter your employee ID" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
        
        <!-- Sign Up Form (Hidden by default) -->
        <form id="signup-form" class="hidden" method="POST" action="/signup">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" name="employee_id" placeholder="Choose an employee ID" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select name="department" required>
                    <option value="">Select Department</option>
                    <option value="Kitchen">Kitchen</option>
                    <option value="Cleaning">Cleaning</option>
                    <option value="Cooking">Cooking</option>
                    <option value="Serving">Serving</option>
                    <option value="Supervision">Supervision</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Choose a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        
        <div class="switch-mode">
            <a id="switch-link">Don't have an account? Sign Up</a>
        </div>
        
        <div class="demo">
            <strong>Demo Credentials:</strong><br>
            👤 Admin: EMP006 / admin123<br>
            👤 Employee: EMP001 / 1234
        </div>
    </div>
    
    <script>
        let isLoginMode = true;
        
        function switchMode() {
            isLoginMode = !isLoginMode;
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const title = document.getElementById('form-title');
            const switchLink = document.getElementById('switch-link');
            
            if (isLoginMode) {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                title.textContent = 'Login to continue';
                switchLink.textContent = "Don't have an account? Sign Up";
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                title.textContent = 'Create new account';
                switchLink.textContent = 'Already have an account? Login';
            }
        }
        
        document.getElementById('switch-link').addEventListener('click', switchMode);
        
        // Check for messages from server
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const success = urlParams.get('success');
        
        if (error) {
            document.getElementById('error-message').innerHTML = `<div class="error">${error}</div>`;
        }
        if (success) {
            document.getElementById('error-message').innerHTML = `<div class="success">${success}</div>`;
            setTimeout(() => switchMode(), 2000);
        }
    </script>
</body>
</html>
